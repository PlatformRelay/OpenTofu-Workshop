# .pre-commit-config.yaml — local quality gate for the workshop repo.
#
# Install once:  pipx install pre-commit && pre-commit install
# Run on demand: pre-commit run --all-files
#
# OpenTofu-first: the pre-commit-terraform hooks honor the PCT_TFPATH env var to
# select the binary. Export it so every hook shells out to `tofu`, never
# `terraform`:
#
#   export PCT_TFPATH="$(command -v tofu)"
#   pre-commit run --all-files
#
# (`entry`/`language` on a remote hook are NOT user-overridable, so PCT_TFPATH is
# the supported OpenTofu switch. `default_language_version` below documents it.)
minimum_pre_commit_version: "3.5.0"

repos:
  # --- OpenTofu / Terraform hooks -------------------------------------------
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.99.0
    hooks:
      - id: terraform_fmt
        name: tofu fmt
        # Honors PCT_TFPATH → runs `tofu fmt`. See header note.
        files: \.tf$

      - id: terraform_tflint
        name: tflint
        args:
          - "--args=--config=__GIT_WORKING_DIR__/.tflint.hcl"

      - id: terraform_docs
        name: terraform-docs (module READMEs)
        args:
          - "--hook-config=--path-to-file=README.md"
          - "--hook-config=--add-to-existing-file=true"
          - "--hook-config=--create-file-if-not-exist=true"

  # --- Secrets scanning ------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks (secret scan)

  # --- Generic hygiene -------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: mixed-line-ending
        args: ["--fix=lf"]
